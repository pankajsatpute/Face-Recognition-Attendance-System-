<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS | Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reg-card { border: none; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-success { padding: 12px; font-weight: 600; border-radius: 10px; }
        .helptext { font-size: 0.75rem; color: #64748b; margin-top: 5px; display: block; }
        ul { list-style: none; padding: 0; font-size: 0.75rem; color: #ef4444; }
    </style>
</head>
<body>

<div class="card reg-card p-4">
    <div class="text-center mb-4">
        <h4 class="fw-bold">Create Admin Account</h4>
        <p class="text-muted small">Register to manage student attendance</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label small fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <span class="helptext">{{ field.help_text }}</span>
                {% endif %}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success w-100 mt-2">Create Account</button>
    </form>

    <div class="text-center mt-3">
        <p class="small text-muted">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login here</a></p>
    </div>
</div>

<script>
    document.querySelectorAll('input').forEach(input => {
        input.classList.add('form-control');
    });
</script>

</body>
</html>
