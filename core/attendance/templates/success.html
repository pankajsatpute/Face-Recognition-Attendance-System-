<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success | FRAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .success-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 500px; }
        .icon-circle { width: 80px; height: 80px; background: #e6fffa; color: #2d947a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-circle">
            <i class="fas fa-check-circle"></i>
        </div>
        <h2 class="fw-bold text-dark">{{ msg }}</h2>
        <p class="text-muted">{{ sub_msg }}</p>
        <hr>
        <div class="d-grid gap-2">
            <a href="{% url 'home' %}" class="btn btn-primary rounded-pill">Back to Dashboard</a>
            <a href="{% url 'mark_attendance' %}" class="btn btn-outline-success rounded-pill">Take Attendance Now</a>
        </div>
    </div>
</body>
</html>
