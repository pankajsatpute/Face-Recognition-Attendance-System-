<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS AI | Register Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-card{
            width:520px;
            background:#fff;
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 45px rgba(0,0,0,.25);
        }

        .logo{
            width:90px;
            height:90px;
            background:#2563eb;
            color:white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            margin-bottom:20px;
            font-size:40px;
        }

        h2{
            text-align:center;
            font-weight:700;
            color:#0f172a;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:35px;
        }

        label{
            font-weight:600;
            color:#334155;
            margin-bottom:8px;
        }

        .form-control{
            height:55px;
            border-radius:12px;
            font-size:16px;
            margin-bottom:20px;
        }

        .form-control:focus{
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.2);
        }

        .btn-register{
            width:100%;
            height:55px;
            border:none;
            border-radius:12px;
            background:#10b981;
            color:white;
            font-size:18px;
            font-weight:600;
            transition:.3s;
        }

        .btn-register:hover{
            background:#059669;
            transform:translateY(-2px);
        }

        .back-btn{
            width:100%;
            height:50px;
            margin-top:15px;
            border-radius:12px;
        }

        .alert{
            border-radius:12px;
        }

        @media(max-width:600px){

            .register-card{
                width:95%;
                padding:30px;
            }

        }

    </style>

</head>
<body>

<div class="register-card">

    <div class="logo">
        <i class="fas fa-user-graduate"></i>
    </div>

    <h2>Student Registration</h2>

    <p class="subtitle">
        Capture student's face and save securely.
    </p>

    <!-- Django Messages -->

    {% if messages %}
        {% for message in messages %}

            <div class="alert alert-{{ message.tags }}">

                {{ message }}

            </div>

        {% endfor %}
    {% endif %}

    <!-- Form -->

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>
                Student Name
            </label>

            <input
                type="text"
                class="form-control"
                name="name"
                placeholder="Enter Full Name"
                required>

        </div>

        <div class="mb-3">

            <label>
                Student ID
            </label>

            <input
                type="text"
                class="form-control"
                name="student_id"
                placeholder="Enter Student ID"
                required>

        </div>

        <button class="btn-register" type="submit">

            <i class="fas fa-camera me-2"></i>

            Capture Face & Register

        </button>

    </form>

    <a href="{% url 'home' %}" class="btn btn-outline-primary back-btn">

        <i class="fas fa-arrow-left me-2"></i>

        Back to Dashboard

    </a>

</div>

</body>
</html>
