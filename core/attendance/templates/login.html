<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS | Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { border: none; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background: #2563eb; border: none; padding: 12px; font-weight: 600; border-radius: 10px; }
        .form-control { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="card login-card p-4">
    <div class="text-center mb-4">
        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
            <i class="fas fa-lock fa-lg"></i>
        </div>
        <h4 class="fw-bold">Admin Login</h4>
        <p class="text-muted small">Enter your credentials to access FRAS</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
        <div class="alert alert-danger small py-2">Invalid username or password.</div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>

    <div class="text-center mt-4">
        <p class="small text-muted">Don't have an account? <a href="{% url 'register_account' %}" class="text-decoration-none">Create one</a></p>
    </div>
</div>

</body>
</html>
