<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student | FRAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .edit-card { border: none; border-radius: 20px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .form-control { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 5px; }
        .btn-primary { padding: 12px; border-radius: 10px; font-weight: 600; background: #2563eb; border: none; }
    </style>
</head>
<body>

<div class="card edit-card p-4">
    <div class="text-center mb-4">
        <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
            <i class="fas fa-user-edit fa-lg"></i>
        </div>
        <h4 class="fw-bold">Update Student Info</h4>
        <p class="text-muted small">Editing record for: <strong>{{ student.name }}</strong></p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label small fw-bold">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold">Student ID / Roll No.</label>
            <input type="text" name="student_id" class="form-control" value="{{ student.student_id }}" required>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'view_students' %}" class="btn btn-light text-muted">Cancel</a>
        </div>
    </form>
    
    <div class="mt-4 pt-3 border-top text-center">
        <small class="text-muted italic"><i class="fas fa-info-circle me-1"></i> Biometric data is preserved during info updates.</small>
    </div>
</div>

</body>
</html>
